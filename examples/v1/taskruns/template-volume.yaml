apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: template-volume-
spec:
  taskSpec:
    steps:
    - name: write
      image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      script: |
        #!/usr/bin/env bash
        echo some stuff > /im/a/custom/mount/path/file
      volumeMounts:
      - name: custom
        mountPath: /im/a/custom/mount/path
    - name: read
      image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      script: |
        #!/usr/bin/env bash
        cat /short/and/stout/file
      volumeMounts:
      - name: custom
        mountPath: /short/and/stout
  podTemplate:
    volumes:
    - name: custom
      emptyDir: {}
