apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: task-param-enum
spec:
  params:
  - name: message
    enum: ["v1", "v2", "v3"]
    default: "v1"
  steps:
  - name: build
    image: mirror.gcr.io/bash@sha256:e320b40b14abc61f053286705070342c46034a549a276b798e64541457c4af92
    script: |
      echo "$(params.message)"
---
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  name: taskrun-param-enum
spec:
  taskRef:
    name: task-param-enum
  params:
    - name: message
      value: "v1"
