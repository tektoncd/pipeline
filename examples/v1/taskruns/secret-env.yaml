kind: Secret
apiVersion: v1
metadata:
  name: secret-env-password
stringData:
  ninja: SECRET_PASSWORD
---
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  name: secret-env
spec:
  taskSpec:
    steps:
    - name: secret
      image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      script: |
        #!/usr/bin/env bash
        [[ $SECRET_PASSWORD == SECRET_PASSWORD ]]
      env:
      - name: SECRET_PASSWORD
        valueFrom:
          secretKeyRef:
            name: secret-env-password
            key: ninja
