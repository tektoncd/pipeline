apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: task-with-workspace-run-
spec:
  taskSpec:
    steps:
      - name: list-files
        image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
        script: ls $(workspaces.read-allowed.path)
    workspaces:
      - name: read-allowed
  workspaces:
    - name: read-allowed
      volumeClaimTemplate:
        metadata:
          name: pvc
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
          volumeMode: Filesystem
