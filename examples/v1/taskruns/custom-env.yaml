apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: custom-env-
spec:
  taskSpec:
    steps:
    - image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      script: |
        #!/usr/bin/env bash
        [[ $MY_VAR1 == foo ]]
      env:
      - name: MY_VAR1
        value: foo
