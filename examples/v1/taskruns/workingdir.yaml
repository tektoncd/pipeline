apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: workingdir-
spec:
  taskSpec:
    steps:
    - name: default
      image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      workingDir: /workspace
      script: |
        #!/usr/bin/env bash
        [[ $PWD == /workspace ]]

    - name: override
      image: mirror.gcr.io/ubuntu@sha256:0d39fcc8335d6d74d5502f6df2d30119ff4790ebbb60b364818d5112d9e3e932
      workingDir: '/a/path/too/far'
      script: |
        #!/usr/bin/env bash
        [[ $PWD == /a/path/too/far ]]
