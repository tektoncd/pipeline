# In this example a PipelineRun accepts a workspace
# to use as ssh credentials. The PipelineTask
# is configured so that only one of its Steps has access
# to those creds.
kind: Secret
apiVersion: v1
metadata:
  name: test-ssh-credentials
# Do NOT hardcode private keys here.
# Create the Secret externally using a private key file, for example:
#   kubectl create secret generic test-ssh-credentials --from-file=id_rsa=/path/to/your/private/id_rsa
# Alternatively, populate the 'id_rsa' field via a secrets manager or CI/CD secret injection.
#
# stringData:
#   id_rsa: <contents of your private key file — never commit this value>
---
kind: PipelineRun
apiVersion: tekton.dev/v1
metadata:
  generateName: isolated-workspaces-
spec:
  timeouts:
    pipeline: 60s
  workspaces:
  - name: ssh-credentials
    secret:
      secretName: test-ssh-credentials

  pipelineSpec:
    workspaces:
    - name: ssh-credentials

    tasks:
    - name: test-isolation
      workspaces:
      - name: creds
        workspace: ssh-credentials
      taskSpec:
        workspaces:
        - name: creds
        steps:
        - image: mirror.gcr.io/alpine
          script: |
            if [ ! -d /creds ] ; then
              echo "unable to access creds"
              exit 1
            fi
          workspaces:
          - name: creds
            mountpath: /creds
        - image: mirror.gcr.io/alpine
          script: |
            if [ -d /workspace/creds ] ; then
              echo "this step should not be able to see creds"
              exit 255
            fi
