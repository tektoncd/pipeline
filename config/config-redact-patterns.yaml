apiVersion: v1
kind: ConfigMap
metadata:
  name: config-redact-patterns
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/instance: default
    app.kubernetes.io/part-of: tekton-pipelines
data:
  # Regex patterns used to redact sensitive values from step logs.
  # One pattern per line. Lines starting with # are ignored.
  #
  # The JWT pattern below matches Kubernetes service account tokens
  # and is included by default. Remove it only if you are certain
  # your workloads do not leak SA tokens via set -x or similar.
  #
  # To add custom patterns (e.g. GitHub PATs, GitLab tokens, Slack tokens),
  # append them below the JWT pattern.
  patterns: |
    eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+
    # ghp_[A-Za-z0-9]{36}
    # glpat-[A-Za-z0-9\-_]{20,}
    # xoxb-[0-9]{10,13}-[A-Za-z0-9]{24}
