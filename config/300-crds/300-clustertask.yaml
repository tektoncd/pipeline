apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustertasks.tekton.dev
  labels:
    app.kubernetes.io/instance: default
    app.kubernetes.io/part-of: tekton-pipelines
    pipeline.tekton.dev/release: "devel"
    version: "devel"
spec:
  group: tekton.dev
  preserveUnknownFields: false
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          # One can use x-kubernetes-preserve-unknown-fields: true
          # at the root of the schema (and inside any properties, additionalProperties)
          # to get the traditional CRD behaviour that nothing is pruned, despite
          # setting spec.preserveUnknownProperties: false.
          #
          # See https://kubernetes.io/blog/2019/06/20/crd-structural-schema/
          # See issue: https://github.com/knative/serving/issues/912
          x-kubernetes-preserve-unknown-fields: true
          description: |-
            ClusterTask is a Task with a cluster scope. ClusterTasks are used to
            represent Tasks that should be publicly addressable from any namespace in the
            cluster.

            Deprecated: Please use the cluster resolver instead.
          type: object
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: Spec holds the desired state of the Task from the client
              type: object
              properties:
                description:
                  description: |-
                    Description is a user-facing description of the task that may be
                    used to populate a UI.
                  type: string
                displayName:
                  description: |-
                    DisplayName is a user-facing name of the task that may be
                    used to populate a UI.
                  type: string
                params:
                  description: |-
                    Params is a list of input parameters required to run the task. Params
                    must be supplied as inputs in TaskRuns unless they declare a default
                    value.
                  type: array
                  items:
                    description: |-
                      ParamSpec defines arbitrary parameters needed beyond typed inputs (such as
                      resources). Parameter values are provided by users as inputs on a TaskRun
                      or PipelineRun.
                    type: object
                    required:
                      - name
                    properties:
                      default:
                        description: |-
                          Default is the value a parameter takes if no input value is supplied. If
                          default is set, a Task may be executed without a supplied value for the
                          parameter.
                        type: object
                      description:
                        description: |-
                          Description is a user-facing description of the parameter that may be
                          used to populate a UI.
                        type: string
                      enum:
                        description: |-
                          Enum declares a set of allowed param input values for tasks/pipelines that can be validated.
                          If Enum is not set, no input validation is performed for the param.
                        type: array
                        items:
                          type: string
                      name:
                        description: Name declares the name by which a parameter is referenced.
                        type: string
                      properties:
                        description: Properties is the JSON Schema properties to support key-value pairs parameter.
                        type: object
                        additionalProperties:
                          description: PropertySpec defines the struct for object keys
                          type: object
                          properties:
                            type:
                              description: |-
                                ParamType indicates the type of an input parameter;
                                Used to distinguish between a single string and an array of strings.
                              type: string
                      type:
                        description: |-
                          Type is the user-specified type of the parameter. The possible types
                          are currently "string", "array" and "object", and "string" is the default.
                        type: string
                resources:
                  description: |-
                    Resources is a list input and output resource to run the task
                    Resources are represented in TaskRuns as bindings to instances of
                    PipelineResources.

                    Deprecated: Unused, preserved only for backwards compatibility
                  type: object
                  properties:
                    inputs:
                      description: |-
                        Inputs holds the mapping from the PipelineResources declared in
                        DeclaredPipelineResources to the input PipelineResources required by the Task.
                      type: array
                      items:
                        description: |-
                          TaskResource defines an input or output Resource declared as a requirement
                          by a Task. The Name field will be used to refer to these Resources within
                          the Task definition, and when provided as an Input, the Name will be the
                          path to the volume mounted containing this Resource as an input (e.g.
                          an input Resource named `workspace` will be mounted at `/workspace`).

                          Deprecated: Unused, preserved only for backwards compatibility
                        type: object
                        required:
                          - name
                          - type
                        properties:
                          description:
                            description: |-
                              Description is a user-facing description of the declared resource that may be
                              used to populate a UI.
                            type: string
                          name:
                            description: |-
                              Name declares the name by which a resource is referenced in the
                              definition. Resources may be referenced by name in the definition of a
                              Task's steps.
                            type: string
                          optional:
                            description: |-
                              Optional declares the resource as optional.
                              By default optional is set to false which makes a resource required.
                              optional: true - the resource is considered optional
                              optional: false - the resource is considered required (equivalent of not specifying it)
                            type: boolean
                          targetPath:
                            description: |-
                              TargetPath is the path in workspace directory where the resource
                              will be copied.
                            type: string
                          type:
                            description: Type is the type of this resource;
                            type: string
                      x-kubernetes-list-type: atomic
                    outputs:
                      description: |-
                        Outputs holds the mapping from the PipelineResources declared in
                        DeclaredPipelineResources to the input PipelineResources required by the Task.
                      type: array
                      items:
                        description: |-
                          TaskResource defines an input or output Resource declared as a requirement
                          by a Task. The Name field will be used to refer to these Resources within
                          the Task definition, and when provided as an Input, the Name will be the
                          path to the volume mounted containing this Resource as an input (e.g.
                          an input Resource named `workspace` will be mounted at `/workspace`).

                          Deprecated: Unused, preserved only for backwards compatibility
                        type: object
                        required:
                          - name
                          - type
                        properties:
                          description:
                            description: |-
                              Description is a user-facing description of the declared resource that may be
                              used to populate a UI.
                            type: string
                          name:
                            description: |-
                              Name declares the name by which a resource is referenced in the
                              definition. Resources may be referenced by name in the definition of a
                              Task's steps.
                            type: string
                          optional:
                            description: |-
                              Optional declares the resource as optional.
                              By default optional is set to false which makes a resource required.
                              optional: true - the resource is considered optional
                              optional: false - the resource is considered required (equivalent of not specifying it)
                            type: boolean
                          targetPath:
                            description: |-
                              TargetPath is the path in workspace directory where the resource
                              will be copied.
                            type: string
                          type:
                            description: Type is the type of this resource;
                            type: string
                      x-kubernetes-list-type: atomic
                results:
                  description: Results are values that this Task can output
                  type: array
                  items:
                    description: TaskResult used to describe the results of a task
                    type: object
                    required:
                      - name
                    properties:
                      description:
                        description: Description is a human-readable description of the result
                        type: string
                      name:
                        description: Name the given name
                        type: string
                      properties:
                        description: Properties is the JSON Schema properties to support key-value pairs results.
                        type: object
                        additionalProperties:
                          description: PropertySpec defines the struct for object keys
                          type: object
                          properties:
                            type:
                              description: |-
                                ParamType indicates the type of an input parameter;
                                Used to distinguish between a single string and an array of strings.
                              type: string
                      type:
                        description: |-
                          Type is the user-specified type of the result. The possible type
                          is currently "string" and will support "array" in following work.
                        type: string
                      value:
                        description: Value the expression used to retrieve the value of the result from an underlying Step.
                        type: object
                  x-kubernetes-list-type: atomic
                sidecars:
                  description: |-
                    Sidecars are run alongside the Task's step containers. They begin before
                    the steps start and end after the steps complete.
                  type: array
                  items:
                    description: Sidecar has nearly the same data structure as Step but does not have the ability to timeout.
                    type: object
                    required:
                      - name
                    properties:
                      args:
                        description: |-
                          Arguments to the entrypoint.
                          The image's CMD is used if this is not provided.
                          Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
                          cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
                          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
                          produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
                          of whether the variable exists or not. Cannot be updated.
                          More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
                        type: array
                        items:
                          type: string
                        x-kubernetes-list-type: atomic
                      command:
                        description: |-
                          Entrypoint array. Not executed within a shell.
                          The image's ENTRYPOINT is used if this is not provided.
                          Variable references $(VAR_NAME) are expanded using the Sidecar's environment. If a variable
                          cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
                          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
                          produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
                          of whether the variable exists or not. Cannot be updated.
                          More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
                        type: array
                        items:
                          type: string
                        x-kubernetes-list-type: atomic
                      env:
                        description: |-
                          List of environment variables to set in the Sidecar.
                          Cannot be updated.
                        type: array
                        items:
                          description: EnvVar represents an environment variable present in a Container.
                          type: object
                          required:
                            - name
                          properties:
                            name:
                              description: Name of the environment variable. Must be a C_IDENTIFIER.
                              type: string
                            value:
                              description: |-
                                Variable references $(VAR_NAME) are expanded
                                using the previously defined environment variables in the container and
                                any service environment variables. If a variable cannot be resolved,
                                the reference in the input string will be unchanged. Double $$ are reduced
                                to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                Escaped references will never be expanded, regardless of whether the variable
                                exists or not.
                                Defaults to "".
                              type: string
                            valueFrom:
                              description: Source for the environment variable's value. Cannot be used if value is not empty.
                              type: object
                              properties:
                                configMapKeyRef:
                                  description: Selects a key of a ConfigMap.
                                  type: object
                                  required:
                                    - key
                                  properties:
                                    key:
                                      description: The key to select.
                                      type: string
                                    name:
                                      description: |-
                                        Name of the referent.
                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                      type: string
                                    optional:
                                      description: Specify whether the ConfigMap or its key must be defined
                                      type: boolean
                                  x-kubernetes-map-type: atomic
                                fieldRef:
                                  description: |-
                                    Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                    spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                  type: object
                                  required:
                                    - fieldPath
                                  properties:
                                    apiVersion:
                                      description: Version of the schema the FieldPath is written in terms of, defaults to "v1".
                                      type: string
                                    fieldPath:
                                      description: Path of the field to select in the specified API version.
                                      type: string
                                  x-kubernetes-map-type: atomic
                                resourceFieldRef:
                                  description: |-
                                    Selects a resource of the container: only resources limits and requests
                                    (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                  type: object
                                  required:
                                    - resource
                                  properties:
                                    containerName:
                                      description: 'Container name: required for volumes, optional for env vars'
                                      type: string
                                    divisor:
                                      description: Specifies the output format of the exposed resources, defaults to "1"
                                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                      anyOf:
                                        - type: integer
                                        - type: string
                                      x-kubernetes-int-or-string: true
                                    resource:
                                      description: 'Required: resource to select'
                                      type: string
                                  x-kubernetes-map-type: atomic
                                secretKeyRef:
                                  description: Selects a key of a secret in the pod's namespace
                                  type: object
                                  required:
                                    - key
                                  properties:
                                    key:
                                      description: The key of the secret to select from.  Must be a valid secret key.
                                      type: string
                                    name:
                                      description: |-
                                        Name of the referent.
                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                      type: string
                                    optional:
                                      description: Specify whether the Secret or its key must be defined
                                      type: boolean
                                  x-kubernetes-map-type: atomic
                        x-kubernetes-list-type: atomic
                      envFrom:
                        description: |-
                          List of sources to populate environment variables in the Sidecar.
                          The keys defined within a source must be a C_IDENTIFIER. All invalid keys
                          will be reported as an event when the Sidecar is starting. When a key exists in multiple
                          sources, the value associated with the last source will take precedence.
                          Values defined by an Env with a duplicate key will take precedence.
                          Cannot be updated.
                        type: array
                        items:
                          description: EnvFromSource represents the source of a set of ConfigMaps
                          type: object
                          properties:
                            configMapRef:
                              description: The ConfigMap to select from
                              type: object
                              properties:
                                name:
                                  description: |-
                                    Name of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap must be defined
                                  type: boolean
                              x-kubernetes-map-type: atomic
                            prefix:
                              description: An optional identifier to prepend to each key in the ConfigMap. Must be a C_IDENTIFIER.
                              type: string
                            secretRef:
                              description: The Secret to select from
                              type: object
                              properties:
                                name:
                                  description: |-
                                    Name of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret must be defined
                                  type: boolean
                              x-kubernetes-map-type: atomic
                        x-kubernetes-list-type: atomic
                      image:
                        description: |-
                          Image name to be used by the Sidecar.
                          More info: https://kubernetes.io/docs/concepts/containers/images
                        type: string
                      imagePullPolicy:
                        description: |-
                          Image pull policy.
                          One of Always, Never, IfNotPresent.
                          Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
                          Cannot be updated.
                          More info: https://kubernetes.io/docs/concepts/containers/images#updating-images
                        type: string
                      lifecycle:
                        description: |-
                          Actions that the management system should take in response to Sidecar lifecycle events.
                          Cannot be updated.
                        type: object
                        properties:
                          postStart:
                            description: |-
                              PostStart is called immediately after a container is created. If the handler fails,
                              the container is terminated and restarted according to its restart policy.
                              Other management of the container blocks until the hook completes.
                              More info: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/#container-hooks
                            type: object
                            properties:
                              exec:
                                description: Exec specifies the action to take.
                                type: object
                                properties:
                                  command:
                                    description: |-
                                      Command is the command line to execute inside the container, the working directory for the
                                      command  is root ('/') in the container's filesystem. The command is simply exec'd, it is
                                      not run inside a shell, so traditional shell instructions ('|', etc) won't work. To use
                                      a shell, you need to explicitly call out to that shell.
                                      Exit status of 0 is treated as live/healthy and non-zero is unhealthy.
                                    type: array
                                    items:
                                      type: string
                              httpGet:
                                description: HTTPGet specifies the http request to perform.
                                type: object
                                required:
                                  - port
                                properties:
                                  host:
                                    description: |-
                                      Host name to connect to, defaults to the pod IP. You probably want to set
                                      "Host" in httpHeaders instead.
                                    type: string
                                  httpHeaders:
                                    description: Custom headers to set in the request. HTTP allows repeated headers.
                                    type: array
                                    items:
                                      description: HTTPHeader describes a custom header to be used in HTTP probes
                                      type: object
                                      required:
                                        - name
                                        - value
                                      properties:
                                        name:
                                          description: |-
                                            The header field name.
                                            This will be canonicalized upon output, so case-variant names will be understood as the same header.
                                          type: string
                                        value:
                                          description: The header field value
                                          type: string
                                  path:
                                    description: Path to access on the HTTP server.
                                    type: string
                                  port:
                                    description: |-
                                      Name or number of the port to access on the container.
                                      Number must be in the range 1 to 65535.
                                      Name must be an IANA_SVC_NAME.
                                    anyOf:
                                      - type: integer
                                      - type: string
                                    x-kubernetes-int-or-string: true
                                  scheme:
                                    description: |-
                                      Scheme to use for connecting to the host.
                                      Defaults to HTTP.
                                    type: string
                              sleep:
                                description: Sleep represents the duration that the container should sleep before being terminated.
                                type: object
                                required:
                                  - seconds
                                properties:
                                  seconds:
                                    description: Seconds is the number of seconds to sleep.
                                    type: integer
                                    format: int64
                              tcpSocket:
                                description: |-
                                  Deprecated. TCPSocket is NOT supported as a LifecycleHandler and kept
                                  for the backward compatibility. There are no validation of this field and
                                  lifecycle hooks will fail in runtime when tcp handler is specified.
                                type: object
                                required:
                                  - port
                                properties:
                                  host:
                                    description: 'Optional: Host name to connect to, defaults to the pod IP.'
                                    type: string
                                  port:
                                    description: |-
                                      Number or name of the port to access on the container.
                                      Number must be in the range 1 to 65535.
                                      Name must be an IANA_SVC_NAME.
                                    anyOf:
                                      - type: integer
                                      - type: string
                                    x-kubernetes-int-or-string: true
                          preStop:
                            description: |-
                              PreStop is called immediately before a container is terminated due to an
                              API request or management event such as liveness/startup probe failure,
                              preemption, resource contention, etc. The handler is not called if the
                              container crashes or exits. The Pod's termination grace period countdown begins before the
                              PreStop hook is executed. Regardless of the outcome of the handler, the
                              container will eventually terminate within the Pod's termination grace
                              period (unless delayed by finalizers). Other management of the container blocks until the hook completes
                              or until the termination grace period is reached.
                              More info: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/#container-hooks
                            type: object
                            properties:
                              exec:
                                description: Exec specifies the action to take.
                                type: object
                                properties:
                                  command:
                                    description: |-
                                      Command is the command line to execute inside the container, the working directory for the
                                      command  is root ('/') in the container's filesystem. The command is simply exec'd, it is
                                      not run inside a shell, so traditional shell instructions ('|', etc) won't work. To use
                                      a shell, you need to explicitly call out to that shell.
                                      Exit status of 0 is treated as live/healthy and non-zero is unhealthy.
                                    type: array
                                    items:
                                      type: string
                              httpGet:
                                description: HTTPGet specifies the http request to perform.
                                type: object
                                required:
                                  - port
                                properties:
                                  host:
                                    description: |-
                                      Host name to connect to, defaults to the pod IP. You probably want to set
                                      "Host" in httpHeaders instead.
                                    type: string
                                  httpHeaders:
                                    description: Custom headers to set in the request. HTTP allows repeated headers.
                                    type: array
                                    items:
                                      description: HTTPHeader describes a custom header to be used in HTTP probes
                                      type: object
                                      required:
                                        - name
                                        - value
                                      properties:
                                        name:
                                          description: |-
                                            The header field name.
                                            This will be canonicalized upon output, so case-variant names will be understood as the same header.
                                          type: string
                                        value:
                                          description: The header field value
                                          type: string
                                  path:
                                    description: Path to access on the HTTP server.
                                    type: string
                                  port:
                                    description: |-
                                      Name or number of the port to access on the container.
                                      Number must be in the range 1 to 65535.
                                      Name must be an IANA_SVC_NAME.
                                    anyOf:
                                      - type: integer
                                      - type: string
                                    x-kubernetes-int-or-string: true
                                  scheme:
                                    description: |-
                                      Scheme to use for connecting to the host.
                                      Defaults to HTTP.
                                    type: string
                              sleep:
                                description: Sleep represents the duration that the container should sleep before being terminated.
                                type: object
                                required:
                                  - seconds
                                properties:
                                  seconds:
                                    description: Seconds is the number of seconds to sleep.
                                    type: integer
                                    format: int64
                              tcpSocket:
                                description: |-
                                  Deprecated. TCPSocket is NOT supported as a LifecycleHandler and kept
                                  for the backward compatibility. There are no validation of this field and
                                  lifecycle hooks will fail in runtime when tcp handler is specified.
                                type: object
                                required:
                                  - port
                                properties:
                                  host:
                                    description: 'Optional: Host name to connect to, defaults to the pod IP.'
                                    type: string
                                  port:
                                    description: |-
                                      Number or name of the port to access on the container.
                                      Number must be in the range 1 to 65535.
                                      Name must be an IANA_SVC_NAME.
                                    anyOf:
                                      - type: integer
                                      - type: string
                                    x-kubernetes-int-or-string: true
                      livenessProbe:
                        description: |-
                          Periodic probe of Sidecar liveness.
                          Container will be restarted if the probe fails.
                          Cannot be updated.
                          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
                        type: object
                        properties:
                          exec:
                            description: Exec specifies the action to take.
                            type: object
                            properties:
                              command:
                                description: |-
                                  Command is the command line to execute inside the container, the working directory for the
                                  command  is root ('/') in the container's filesystem. The command is simply exec'd, it is
                                  not run inside a shell, so traditional shell instructions ('|', etc) won't work. To use
                                  a shell, you need to explicitly call out to that shell.
                                  Exit status of 0 is treated as live/healthy and non-zero is unhealthy.
                                type: array
                                items:
                                  type: string
                          failureThreshold:
                            description: |-
                              Minimum consecutive failures for the probe to be considered failed after having succeeded.
                              Defaults to 3. Minimum value is 1.
                            type: integer
                            format: int32
                          grpc:
                            description: GRPC specifies an action involving a GRPC port.
                            type: object
                            required:
                              - port
                            properties:
                              port:
                                description: Port number of the gRPC service. Number must be in the range 1 to 65535.
                                type: integer
                                format: int32
                              service:
                                description: |-
                                  Service is the name of the service to place in the gRPC HealthCheckRequest
                                  (see https://github.com/grpc/grpc/blob/master/doc/health-checking.md).

                                  If this is not specified, the default behavior is defined by gRPC.
                                type: string
                                default: ""
                          httpGet:
                            description: HTTPGet specifies the http request to perform.
                            type: object
                            required:
                              - port
                            properties:
                              host:
                                description: |-
                                  Host name to connect to, defaults to the pod IP. You probably want to set
                                  "Host" in httpHeaders instead.
                                type: string
                              httpHeaders:
                                description: Custom headers to set in the request. HTTP allows repeated headers.
                                type: array
                                items:
                                  description: HTTPHeader describes a custom header to be used in HTTP probes
                                  type: object
                                  required:
                                    - name
                                    - value
                                  properties:
                                    name:
                                      description: |-
                                        The header field name.
                                        This will be canonicalized upon output, so case-variant names will be understood as the same header.
                                      type: string
                                    value:
                                      description: The header field value
                                      type: string
                              path:
                                description: Path to access on the HTTP server.
                                type: string
