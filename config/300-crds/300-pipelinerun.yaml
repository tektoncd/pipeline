                  description: PipelineRef can be used to refer to a specific instance of a Pipeline.
                  type: object
                  properties:
                    apiVersion:
                      description: API version of the referent
                      type: string
                    bundle:
                      description: |-
                        Bundle url reference to a Tekton Bundle.

