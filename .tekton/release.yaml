# This PipelineRun is triggered by Pipelines-as-Code when a release
# branch (release-v*) is first created. It runs the release pipeline
# defined in tekton/release-pipeline.yaml from this repository.
#
# The release pipeline builds, publishes images, uploads artifacts to
# the release bucket, and the draft GitHub release is created separately.
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: release-pipeline
  annotations:
    # NOTE: on-cel-expression takes precedence over on-event/on-target-branch,
    # so the branch filter MUST be included in the CEL expression.
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[refs/heads/release-v*]"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push" && has(body.created) && body.created == true &&
      target_branch.startsWith("release-v")
    pipelinesascode.tekton.dev/pipeline: "tekton/release-pipeline.yaml"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  pipelineRef:
    name: pipeline-release
  params:
    - name: package
      value: github.com/tektoncd/pipeline
    - name: repoName
      value: pipeline
    - name: gitRevision
      value: "{{ revision }}"
    - name: imageRegistry
      value: ghcr.io
    - name: imageRegistryPath
      value: tektoncd/pipeline
    - name: imageRegistryRegions
      value: ""
    - name: imageRegistryUser
      value: tekton-robot
    # For initial releases, the version is derived from the branch name:
    # release-v0.76.x → v0.76.0
    - name: versionTag
      value: '{{ cel: pac.target_branch.replace("release-", "").replace(".x", ".0") }}'
    - name: releaseBucket
      value: tekton-releases
    - name: releaseAsLatest
      value: "true"
    - name: koExtraArgs
      value: ""
    - name: serviceAccountImagesPath
      value: credentials
    - name: runTests
      value: "true"
    # Auto-detected from git tags when empty
    - name: previousReleaseTag
      value: ""
  timeouts:
    pipeline: 3h0m0s
  workspaces:
    - name: workarea
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
    - name: release-secret
      secret:
        secretName: oci-release-secret
    - name: release-images-secret
      secret:
        secretName: ghcr-creds
    # Enables automatic draft GitHub release creation (PR #9420).
    # When bound, the pipeline waits for Chains signing and creates
    # a draft release with changelog. When not bound, skipped.
    - name: github-secret
      secret:
        secretName: github-token
