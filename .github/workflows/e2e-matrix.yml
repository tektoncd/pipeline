name: Tekton Integration
# Adapted from https://github.com/mattmoor/mink/blob/master/.github/workflows/minkind.yaml

on:
  workflow_call:
    inputs:
      is-draft:
        description: 'Whether the PR is a draft'
        required: false
        default: false
        type: boolean
      k8s-versions:
        description: 'JSON array of k8s versions e.g. ["v1.28.x","v1.34.x"]'
        type: string
        required: false
        default: '["v1.28.x", "v1.34.x"]'
      arm64-k8s-version:
        description: 'k8s version to run on arm64 with stable'
        type: string
        required: false
        default: 'v1.34.x'
      feature-flags:
        description: 'JSON array of feature flags e.g. ["stable","beta","alpha"]'
        type: string
        required: false
        default: '["stable", "beta", "alpha"]'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  compute-matrix:
    name: compute e2e matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        sparse-checkout: .github
        persist-credentials: false
    - name: Select matrix
      id: matrix
      run: |
        if [ "${IS_DRAFT}" = "true" ]; then
          echo "Using draft matrix (amd64, k8s-latest, stable)"
          echo "matrix=$(jq -c . .github/e2e-matrix-draft.json)" >> $GITHUB_OUTPUT
        else
          echo "Using full matrix"
          echo "matrix=$(jq -c . .github/e2e-matrix-full.json)" >> $GITHUB_OUTPUT
        fi
      env:
        IS_DRAFT: ${{ inputs.is-draft }}

  e2e-tests:
    needs: [compute-matrix]
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.k8s-version }}-${{ matrix.feature-flags }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    name: e2e tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        os:
        - ubuntu-latest     # amd64
        - ubuntu-24.04-arm  # arm64

        k8s-version: ${{ fromJSON(inputs.k8s-versions) }}

        feature-flags: ${{ fromJSON(inputs.feature-flags) }}

        # arm64: exclude all generated combinations, then include back
        # exactly one (arm64-k8s-version + stable) via the include block below
        exclude:
        - os: ubuntu-24.04-arm

        include:
          - os: ubuntu-24.04-arm
            k8s-version: ${{ inputs.arm64-k8s-version }}
            feature-flags: stable
    env:
      KO_DOCKER_REPO: registry.local:5000/tekton
      CLUSTER_DOMAIN: c${{ github.run_id }}.local
      ARTIFACTS: ${{ github.workspace }}/artifacts
      KOCACHE: /tmp/ko-cache

    steps:
    - name: Free disk space
      if: ${{ matrix.os != 'ubuntu-24.04-arm' }}
      run: |
        echo "--- Disk space before cleanup ---"
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f
        echo "--- Disk space after cleanup ---"
        df -h
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
      with:
        go-version-file: "go.mod"
    - name: Cache ko build cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: /tmp/ko-cache
        key: ${{ runner.os }}-${{ runner.arch }}-ko-${{ hashFiles('go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-ko-
    - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10
      with:
        version: v0.18.1

    - name: Install Dependencies
      working-directory: ./
      run: |
        echo '::group:: install go-junit-report'
        go install github.com/jstemmer/go-junit-report@v0.9.1
        echo '::endgroup::'

        echo '::group:: created required folders'
        mkdir -p "${ARTIFACTS}"
        echo '::endgroup::'

        echo "${GOPATH}/bin" >> "$GITHUB_PATH"

    - name: Run tests
      run: |
        # This is a hack to make sure binary in /bin from the base image are not picked by default
        # On ubuntu-arm, there is a /bin/go that shadows the one setup-go installs
        export PATH="$(echo "$PATH" | sed -e 's/^\/bin://'):/bin"
        export KO_DEFAULTPLATFORMS=linux/$(go env GOARCH)
        ./hack/setup-kind.sh \
          --registry-url $(echo ${KO_DOCKER_REPO} | cut -d'/' -f 1) \
          --cluster-suffix c${{ github.run_id }}.local \
          --nodes 3 \
          --k8s-version ${{ matrix.k8s-version }} \
          --e2e-script ./test/e2e-tests.sh \
          --e2e-env ./test/e2e-tests-kind-${{ matrix.feature-flags }}.env

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ matrix.k8s-version }}-${{ matrix.feature-flags }}-${{ matrix.os }}
        path: ${{ env.ARTIFACTS }}

    - uses: chainguard-dev/actions/kind-diag@f0be69916b439d0fcced2451b23d0f27cd46d545 # v1.6.26
      if: ${{ failure() }}
      with:
        artifact-name: ${{ matrix.k8s-version }}-${{ matrix.feature-flags }}-${{ matrix.os }}-logs

    - name: Dump Artifacts
      if: ${{ failure() }}
      run: |
        if [[ -d ${ARTIFACTS} ]]; then
          cd ${ARTIFACTS}
          for x in $(find . -type f); do
            echo "::group:: artifact $x"
            cat $x
            echo '::endgroup::'
          done
        fi
