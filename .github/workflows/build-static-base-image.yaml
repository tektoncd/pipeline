name: Build static base image

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'images/static-base/**'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install apko
        uses: chainguard-dev/actions/setup-apko@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        run: |
          apko publish images/static-base/apko.yaml \
            ghcr.io/tektoncd/pipeline/static-base:latest

      - name: Verify multi-arch
        run: |
          for arch in amd64 arm64 s390x ppc64le; do
            echo "Checking ${arch}..."
            docker manifest inspect ghcr.io/tektoncd/pipeline/static-base:latest \
              | jq -e ".manifests[] | select(.platform.architecture == \"${arch}\")" \
              || { echo "Missing architecture: ${arch}"; exit 1; }
          done
          echo "All 4 architectures present."
